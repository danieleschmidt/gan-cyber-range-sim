[tool:pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    unit: Unit tests - fast, isolated tests
    integration: Integration tests - test component interactions
    security: Security-focused tests
    performance: Performance and load tests
    e2e: End-to-end tests - full workflow tests
    slow: Slow running tests (> 5 seconds)
    benchmark: Benchmark tests using pytest-benchmark
    smoke: Smoke tests - basic functionality verification
    regression: Regression tests for bug fixes
    flaky: Tests that may be flaky due to timing or external dependencies

# Coverage configuration
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=src/gan_cyber_range
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    --durations=10
    --maxfail=5

# Async test configuration
asyncio_mode = auto

# Timeout configuration
timeout = 300
timeout_method = thread

# Filtering and collection
collect_ignore = [
    "setup.py",
    "venv",
    ".venv", 
    "build",
    "dist"
]

# Custom test discovery
python_paths = src

# Warnings configuration
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning
    ignore:.*unclosed.*:ResourceWarning
    error::UserWarning
    
# Minimum version requirements
minversion = 7.0

# Log configuration for tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Test data and fixture configuration
cache_dir = .pytest_cache
junit_family = xunit2

# Parallel test execution (when pytest-xdist is installed)
# addopts = -n auto